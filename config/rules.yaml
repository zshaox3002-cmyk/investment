# ============================================================
# 十、铁律修改门禁（Meta Rules）
# ============================================================
meta_rules:
  modification_constraints:
    cooling_period_days: 7               # 修改 rules.yaml 需要 7 天冷静期
    require_written_reason: true         # 必须书面记录修改理由
    forbidden_modifications:
      # 在已存在 active_breaches 时，禁止以下修改
      - "提高 single_stock_max 阈值（解决违规问题）"
      - "缩短 grace_period_days"
      - "添加自我豁免性质的 active_exemptions"
      # 永久禁止以下修改
      - "在亏损状态下提高单股仓位上限"
      - "在主动个股超配状态下提高 C 仓位总上限"
      - "为某一只亏损个股单独创建豁免"
      - "用新的叙事替代原始买入逻辑但不写 thesis 更新"
    review_frequency_days: 90            # 每季度回顾一次铁律是否合理

